name: Build data and deploy

on:
  schedule:
    # Lunes 11:00 UTC — refresco semanal de mercado/financieras.
    - cron: '0 11 * * 1'
  push:
    branches: [main]            # curados / código deployan on push
  workflow_dispatch:            # disparo manual

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: build-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # SEC exige un email en el User-Agent. Poné tu contacto real como repo variable
      # (Settings → Secrets and variables → Actions → Variables) para que SEC pueda avisarte.
      SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || 'ep-americas-screener contacto@example.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm ci

      - name: Run data pipeline (market + financials + precios + commodities, cache fallback)
        # yfinance/commodities pueden fallar desde IPs de CI; el pipeline degrada a cache/ y no rompe.
        # Sólo corta (exit 1) ante errores de schema/rango.
        run: python scripts/build_data.py

      - name: Type check
        run: npx tsc --noEmit

      - name: Build site
        run: npm run build

      - name: Commit updated data + cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ cache/ || true
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Auto-update data $(date -u +%Y-%m-%d)"
            git pull --rebase origin main || git rebase --abort
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
